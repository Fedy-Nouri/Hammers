services:
  postgres:
    image: postgres:16-alpine
    container_name: hammers_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hammers}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hammers}
      POSTGRES_DB: ${POSTGRES_DB:-hammers_dev}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hammers} -d ${POSTGRES_DB:-hammers_dev}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hammers_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hammers_backend
    # The full secret/config surface (JWT, OpenAI/Anthropic, ENCRYPTION_KEY, Google,
    # Stripe, Resend, bot secret, …) is supplied from ./backend/.env — copy .env.example
    # and fill it in. The overrides below win over that file for the compose network.
    env_file:
      - ./backend/.env
    environment:
      # Compose-network overrides: target the service containers and force production mode.
      DATABASE_URL: "postgresql://${POSTGRES_USER:-hammers}:${POSTGRES_PASSWORD:-hammers}@postgres:5432/${POSTGRES_DB:-hammers_dev}?schema=public&connection_limit=10"
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # SPA served by nginx, reverse-proxying /api + /uploads to the backend (same origin).
  # Browse the app at http://localhost:8080. Leave VITE_API_URL empty for this proxied
  # setup; set it only for a split-origin deploy where the SPA lives on another domain.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: hammers_frontend
    ports:
      - '8080:80'
    depends_on:
      backend:
        condition: service_healthy

  # Bot fleet — one container per Google account (SC-003). Each self-registers
  # with the backend and joins one meeting at a time. Add capacity by copying a
  # service block with a new BOT_ID, account credentials, and profile volume.
  meeting-bot-1:
    build:
      context: ./agents/meeting-bot
      dockerfile: Dockerfile
    container_name: hammers_meeting_bot_1
    environment:
      PORT: 3001
      BOT_ID: bot-1
      SELF_URL: http://meeting-bot-1:3001
      BACKEND_URL: http://backend:3000
      BOT_CALLBACK_SECRET: ${BOT_CALLBACK_SECRET}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      BOT_GOOGLE_EMAIL: ${BOT1_GOOGLE_EMAIL}
      BOT_GOOGLE_PASSWORD: ${BOT1_GOOGLE_PASSWORD}
      BOT_HEADLESS: 'true'
    ports:
      - '3001:3001'
    volumes:
      - bot1_profile:/app/.bot-profile
    depends_on:
      backend:
        condition: service_healthy

  meeting-bot-2:
    build:
      context: ./agents/meeting-bot
      dockerfile: Dockerfile
    container_name: hammers_meeting_bot_2
    environment:
      PORT: 3001
      BOT_ID: bot-2
      SELF_URL: http://meeting-bot-2:3001
      BACKEND_URL: http://backend:3000
      BOT_CALLBACK_SECRET: ${BOT_CALLBACK_SECRET}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY}
      BOT_GOOGLE_EMAIL: ${BOT2_GOOGLE_EMAIL}
      BOT_GOOGLE_PASSWORD: ${BOT2_GOOGLE_PASSWORD}
      BOT_HEADLESS: 'true'
    ports:
      - '3002:3001'
    volumes:
      - bot2_profile:/app/.bot-profile
    depends_on:
      backend:
        condition: service_healthy

  job-bot-1:
    build:
      context: ./agents/job-bot
      dockerfile: Dockerfile
    container_name: hammers_job_bot_1
    environment:
      PORT: 3002
      BOT_ID: job-bot-1
      SELF_URL: http://job-bot-1:3002
      BACKEND_URL: http://backend:3000
      BOT_CALLBACK_SECRET: ${BOT_CALLBACK_SECRET}
      LINKEDIN_EMAIL: ${JOBBOT1_LINKEDIN_EMAIL}
      LINKEDIN_PASSWORD: ${JOBBOT1_LINKEDIN_PASSWORD}
      PROXY_URL: ${JOBBOT1_PROXY_URL:-}
      BOT_HEADLESS: 'true'
      MAX_JOBS_PER_SCRAPE: '10'
    ports:
      - '3003:3002'
    volumes:
      - jobbot1_profile:/app/.bot-profile
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  bot1_profile:
  bot2_profile:
  jobbot1_profile:
