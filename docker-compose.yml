services:
  postgres:
    image: postgres:16-alpine
    container_name: hammers_postgres
    environment:
      POSTGRES_USER: hammers
      POSTGRES_PASSWORD: hammers
      POSTGRES_DB: hammers_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hammers -d hammers_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hammers_backend
    environment:
      DATABASE_URL: postgresql://hammers:hammers@postgres:5432/hammers_dev?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
