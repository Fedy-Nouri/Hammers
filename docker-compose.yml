services:
  postgres:
    image: postgres:16-alpine
    container_name: hammers_postgres
    environment:
      POSTGRES_USER: hammers
      POSTGRES_PASSWORD: hammers
      POSTGRES_DB: hammers_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hammers -d hammers_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: hammers_backend
    environment:
      DATABASE_URL: postgresql://hammers:hammers@postgres:5432/hammers_dev?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      BOT_SERVICE_URL: http://meeting-bot:3001
      BOT_CALLBACK_SECRET: ${BOT_CALLBACK_SECRET}
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  meeting-bot:
    build:
      context: ./agents/meeting-bot
      dockerfile: Dockerfile
    container_name: hammers_meeting_bot
    environment:
      PORT: 3001
      BOT_GOOGLE_EMAIL: ${BOT_GOOGLE_EMAIL}
      BOT_GOOGLE_PASSWORD: ${BOT_GOOGLE_PASSWORD}
      BACKEND_URL: http://backend:3000
      BOT_CALLBACK_SECRET: ${BOT_CALLBACK_SECRET}
    ports:
      - '3001:3001'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
