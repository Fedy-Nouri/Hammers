server {
    # 8080, not 80: the unprivileged nginx image runs as a non-root user that cannot bind
    # privileged ports. The container is still published on host :8080 via docker-compose.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Content-hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Same-origin reverse proxy to the backend, so the SPA's relative /api and /uploads
    # calls work with no CORS. The global prefix (/api) is preserved (no trailing slash
    # on proxy_pass), so /api/health -> backend:3000/api/health.
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE streams (chat + live transcript) must not be buffered and are long-lived.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /uploads/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
    }

    # SPA client-side routing: unknown paths fall back to index.html (e.g. /admin refresh).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
